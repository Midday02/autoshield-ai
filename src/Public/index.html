<!DOCTYPE html>
<html>
<head>
  <title>AutoShield AI Receptionist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>AutoShield AI Receptionist Console</h1>
      <p class="subheader">Live Call Monitor - Real-time AI activity</p>
    </header>

    <section class="stats">
      <div class="card">
        <h3>Calls Today</h3>
        <p id="callsToday">0</p>
      </div>
      <div class="card">
        <h3>Routed Correctly</h3>
        <p id="routedCorrectly">0%</p>
      </div>
      <div class="card">
        <h3>Avg Handle Time</h3>
        <p id="avgHandle">0m 0s</p>
      </div>
      <div class="card">
        <h3>Sent to VM</h3>
        <p id="sentVM">0</p>
      </div>
    </section>

    <section class="live-call">
      <h2>Incoming Call — In Progress</h2>
      <p id="incomingCall">No active call</p>
      <h3>Collected Data</h3>
      <div id="collectedData"></div>
    </section>

    <section class="breakdown">
      <h2>Today's Routing Breakdown</h2>
      <div id="routingBreakdown"></div>
    </section>

    <section class="ai-scores">
      <h2>AI Confidence Scores</h2>
      <div id="aiScores"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
